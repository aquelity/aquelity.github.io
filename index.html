<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquelity Tech | 淡泊湖科技</title>
    <style>
        :root {
            --bg-color: #0a192f;
            --text-main: #ccd6f6;
            --text-dim: #8892b0;
            --accent: #64ffda;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .content {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            animation: fadeIn 1.5s ease-in-out;
        }
        .logo {
            width: 120px; /* Logo 大小 */
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 10px rgba(100, 255, 218, 0.3));
        }
        h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 2px;
            color: var(--text-main);
        }
        .tagline {
            font-size: 1.1rem;
            color: var(--accent);
            margin: 1rem 0 3rem 0;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .manifesto {
            border-left: 2px solid var(--accent);
            padding-left: 1.5rem;
            text-align: left;
            margin: 2rem auto;
            max-width: 500px;
        }
        .manifesto p {
            line-height: 1.8;
            color: var(--text-dim);
            font-size: 1rem;
        }
        .footer {
            margin-top: 4rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.3s;
        }
        a:hover { opacity: 0.7; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="content">
        <img src="logo.png" alt="Aquelity Logo" class="logo">
        
        <h1>Aquelity Tech</h1>
        <div class="tagline">淡 泊 湖 科 技</div>

        <div class="manifesto">
            <p><strong>静水流深，宁静致远。</strong></p>
            <p>在瞬息万变的数字时代，我们选择像湖泊一样保持深邃与克制。我们不追求盲目的速度，而是打磨每一行代码的韧性。</p>
            <p>Aquelity 致力于为全球用户创造纯粹、易用且具有生命力的技术工具。愿如淡泊湖，任尔东西风。</p>
        </div>

        <div class="footer">
            © 2026 Shanghai Aquelity Network Technology Co., Ltd. <br>
            <a href="mailto:contact@aquelity.com">contact@aquelity.com</a> | 
            <a href="http://danbohu.com">danbohu.com</a>
        </div>
    </div>
</body>
</html>
